<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de tareas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Mi lista de tareas</h1>
            <input type="text"
                    id="taskInput"
                    placeholder="Escribe una nueva tarea"
                    maxlength="50"
                    required
                    aria-label="Nueva tarea"
                    aria-describedby="task-help"
            >
            <small id="task-help" class="help-text">
                Presiona enter o haz click en "Agregar tarea"
            </small>
            <button id="addTaskBtn", aria-label="Agregar nueva tarea">Agregar Tarea</button>
            
            <ul id="taskList">
            </ul>
    </main>

    <script src="index.js"></script>
</body>
</html>
