<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base: Propiedades de Fondo (Background)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Práctica de Fondos</h1>
    </header>

    <!-- 1. Color Sólido -->
    <div class="box simple">
        <h2>Color de Fondo</h2>
        <p>Aplica un color plano aquí.</p>
    </div>

    <!-- 2. Degradado -->
    <div class="box gradient">
        <h2>Fondo Degradado</h2>
        <p>Crea una transición de colores.</p>
    </div>

    <!-- 3. Imagen Cover -->
    <div class="box image-cover">
        <h2>Imagen Ajustada (Cover)</h2>
        <p>Asegúrate de que la imagen cubra todo el espacio.</p>
    </div>

    <!-- 4. Imagen Fixed (Parallax) -->
    <div class="box image-fixed">
        <h2>Fondo Fijo (Fixed)</h2>
        <p>Simula el efecto parallax.</p>
    </div>

        <!-- 4. Imagen Fixed (Parallax) -->
    <div class="box image-pattern">
        <h2>Patron repetido</h2>
    </div>
</body>
</html>
