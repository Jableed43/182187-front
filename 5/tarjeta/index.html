<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío: Tarjeta de Perfil</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome v6 -->
    <script src="https://kit.fontawesome.com/ef88cf4afb.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Contenedor Principal (Centrado Clásico) -->
    <div class="card">
        <!-- 1. Encabezado con Fondo Degradado -->
        <div class="card-header"></div>

        <!-- 2. Imagen de Perfil (Usando Box Model) -->
        <div class="profile-img-container">
            <img src="avatar.png" alt="Perfil" class="profile-img">
        </div>

        <!-- 3. Información (Cuerpo de la Tarjeta) -->
        <div class="card-body">
            <h1 class="name">Juan Pérez</h1>
            <p class="role">Desarrollador Frontend</p>
            <p class="description">
                Apasionado por el diseño visual y la codificación limpia. Aprendiendo React Native en la UTN.
            </p>
        </div>

        <!-- 4. Iconos Sociales (Alineación Inline-Block) -->
        <div class="card-footer">
            <a href="#" class="social-link"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="social-link"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </div>

</body>
</html>
